name: 🐦 Auto Post to X

on:
  schedule:
    # 平日 昼12時(JST) = 03:00 UTC → 昼休みに記事を読んでもらう
    - cron: '0 3 * * 1-5'
    # 土曜 朝7時(JST) = 前日22:00 UTC → 馬券購入前の最終チェック
    - cron: '0 22 * * 5'
    # 日曜 朝7時(JST) = 前日22:00 UTC → 日曜の予想
    - cron: '0 22 * * 6'
    # 土日 9:55(JST) = 00:55 UTC → オッズ確定
    - cron: '55 0 * * 0,6'
    # 日曜 20時(JST) = 11:00 UTC → 振り返り（帰宅後のリラックスタイム）
    - cron: '0 11 * * 0'
    # 土曜 20時(JST) = 11:00 UTC → 当日結果報告
    - cron: '0 11 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - weekday
          - predict
          - results
          - answer_check
          - weekly_review
          - refresh_odds

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tweepy lightgbm pandas numpy scikit-learn requests beautifulsoup4 lxml

      - name: Determine post type
        id: determine
        run: |
          DOW=$(TZ=Asia/Tokyo date +%u)  # 1=Mon ... 7=Sun
          HOUR=$(TZ=Asia/Tokyo date +%H)
          TODAY_YYYYMMDD=$(TZ=Asia/Tokyo date +%Y%m%d)
          TODAY_HYPHEN=$(TZ=Asia/Tokyo date +%Y-%m-%d)

          # 手動実行の場合
          if [ "${{ github.event.inputs.mode }}" != "" ] && [ "${{ github.event.inputs.mode }}" != "auto" ]; then
            echo "type=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "date=$TODAY_YYYYMMDD" >> $GITHUB_OUTPUT
            echo "date_hyphen=$TODAY_HYPHEN" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 自動判定 — UTC時刻ベースで判定
          UTC_HOUR=$(date -u +%H)

          echo "📊 Debug: DOW=$DOW, JST_HOUR=$HOUR, UTC_HOUR=$UTC_HOUR"

          if [ "$UTC_HOUR" = "11" ]; then
            # UTC 11 = JST 20 → 答え合わせ/週間レビュー
            if [ "$DOW" -eq 6 ]; then
              echo "type=answer_check" >> $GITHUB_OUTPUT
            elif [ "$DOW" -eq 7 ]; then
              echo "type=weekly_review" >> $GITHUB_OUTPUT
            else
              echo "type=skip" >> $GITHUB_OUTPUT
            fi
          elif [ "$UTC_HOUR" = "00" ] || [ "$UTC_HOUR" = "01" ]; then
            # UTC 00-01 = JST 09-10 → オッズ確定（土日のみ）
            if [ "$DOW" -eq 6 ] || [ "$DOW" -eq 7 ]; then
              echo "type=refresh_odds" >> $GITHUB_OUTPUT
            else
              echo "type=skip" >> $GITHUB_OUTPUT
            fi
          elif [ "$UTC_HOUR" = "03" ]; then
            # UTC 03 = JST 12 → 平日昼投稿
            if [ "$DOW" -ge 1 ] && [ "$DOW" -le 5 ]; then
              echo "type=weekday" >> $GITHUB_OUTPUT
            else
              echo "type=skip" >> $GITHUB_OUTPUT
            fi
          elif [ "$UTC_HOUR" = "22" ]; then
            # UTC 22 = JST 07 → 朝投稿（土日の予想）
            if [ "$DOW" -eq 5 ] || [ "$DOW" -eq 6 ]; then
              # 金曜UTC22=土曜JST07, 土曜UTC22=日曜JST07
              echo "type=predict" >> $GITHUB_OUTPUT
            else
              echo "type=skip" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=skip" >> $GITHUB_OUTPUT
          fi

          echo "📬 Determined type: $(grep type $GITHUB_OUTPUT | tail -1)"

          echo "date=$TODAY_YYYYMMDD" >> $GITHUB_OUTPUT
          echo "date_hyphen=$TODAY_HYPHEN" >> $GITHUB_OUTPUT

      # 土日はスクレイプ→予測が必要
      - name: Scrape and predict (weekend only)
        if: steps.determine.outputs.type == 'predict' || steps.determine.outputs.type == 'results' || steps.determine.outputs.type == 'answer_check' || steps.determine.outputs.type == 'weekly_review'
        run: |
          DATE="${{ steps.determine.outputs.date }}"
          echo "📥 ${DATE} のデータをスクレイプ..."
          python predict.py collect --date "$DATE" || echo "⚠️ スクレイプ完了（一部エラーあり）"
          echo "🧠 予測を実行..."
          python predict.py predict --date "$DATE" || echo "⚠️ 予測完了（一部エラーあり）"

      # ロック前にオッズ確定
      - name: Refresh odds before lock
        if: steps.determine.outputs.type == 'refresh_odds' || steps.determine.outputs.type == 'predict'
        run: |
          DATE="${{ steps.determine.outputs.date }}"
          echo "📡 ${DATE} の最新オッズを取得..."
          python refresh_odds.py --date "$DATE" || echo "⚠️ オッズ更新完了（一部エラーあり）"

      - name: Post to X
        if: steps.determine.outputs.type != 'skip' && steps.determine.outputs.type != 'refresh_odds'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          TYPE="${{ steps.determine.outputs.type }}"
          DATE="${{ steps.determine.outputs.date }}"

          echo "📬 投稿タイプ: $TYPE / 日付: $DATE"

          if [ "$TYPE" = "weekday" ]; then
            python post_x.py weekday
          elif [ "$TYPE" = "predict" ]; then
            python post_x.py predict --date "$DATE"
          elif [ "$TYPE" = "results" ]; then
            python post_x.py results --date "$DATE"
          elif [ "$TYPE" = "answer_check" ]; then
            python post_x.py answer_check --date "$DATE"
          elif [ "$TYPE" = "weekly_review" ]; then
            python post_x.py weekly_review
          fi
